<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heródoto — Contexto Histórico</title>
  <!-- Se aberto diretamente, redirecionar para index.html -->
  <script>
    // Este ficheiro é um componente interno. O app principal é index.html
    if (window.location.pathname.endsWith('filtros-semanticos.html')) {
      window.location.replace('index.html');
    }
  </script>
</head>
<body>
<!-- SIDEBAR SEMÂNTICA - Heródoto -->
<div id="filtros-semanticos" class="filtros-sidebar">
  
  <!-- 1. PERÍODO HISTÓRICO (MACRO) -->
  <section class="filtro-secao" id="secao-periodos">
      <h3 class="filtro-titulo" onclick="toggleSection('periodos')">
      Período Histórico <span class="toggle-icon">▼</span>
      </h3>
      <div class="filtro-conteudo" id="conteudo-periodos">
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-periodo" value="PreHistory" checked>
      <span>Pré-História (até -3000)</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-periodo" value="Ancient" checked>
      <span>Antiguidade (-3000 a 476)</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-periodo" value="Medieval" checked>
      <span>Medieval (476 a 1453)</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-periodo" value="EarlyModern" checked>
      <span>Moderna Inicial (1453 a 1789)</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-periodo" value="Modern" checked>
      <span>Moderna (1789 a 1945)</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-periodo" value="Contemporary" checked>
      <span>Contemporânea (1945+)</span>
      </label>
      </div>
  </section>

  <!-- 2. SÉCULOS (RECORTE TEMPORAL) -->
  <section class="filtro-secao" id="secao-seculos">
      <h3 class="filtro-titulo" onclick="toggleSection('seculos')">
      Séculos <span class="toggle-icon">▼</span>
      </h3>
      <div class="filtro-conteudo" id="conteudo-seculos">
      <!-- Séculos negativos (a.C.) -->
      <div class="seculo-grupo">
      <h4>Antes de Cristo</h4>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="-30" checked>
      <span>Séc. XXX a.C. e anteriores</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="-20" checked>
      <span>Séc. XX a.C.</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="-15" checked>
      <span>Séc. XV a.C.</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="-10" checked>
      <span>Séc. X a.C.</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="-5" checked>
      <span>Séc. V a.C.</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="-1" checked>
      <span>Séc. I a.C.</span>
      </label>
      </div>
      
      <!-- Séculos positivos (d.C.) -->
      <div class="seculo-grupo">
      <h4>Depois de Cristo</h4>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="1" checked>
      <span>Séc. I</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="5" checked>
      <span>Séc. V</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="10" checked>
      <span>Séc. X</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="15" checked>
      <span>Séc. XV (1401-1500)</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="16" checked>
      <span>Séc. XVI (1501-1600)</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="17" checked>
      <span>Séc. XVII (1601-1700)</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="18" checked>
      <span>Séc. XVIII (1701-1800)</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="19" checked>
      <span>Séc. XIX (1801-1900)</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="20" checked>
      <span>Séc. XX (1901-2000)</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-seculo" value="21" checked>
      <span>Séc. XXI (2001+)</span>
      </label>
      </div>
      </div>
  </section>

  <!-- 3. CONTINENTES (REGIÃO GEOGRÁFICA) -->
  <section class="filtro-secao" id="secao-regioes">
      <h3 class="filtro-titulo" onclick="toggleSection('regioes')">
      Continentes <span class="toggle-icon">▼</span>
      </h3>
      <div class="filtro-conteudo" id="conteudo-regioes">
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-regiao" value="Europe" checked>
      <span>Europa</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-regiao" value="Americas" checked>
      <span>Américas</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-regiao" value="Africa" checked>
      <span>África</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-regiao" value="MiddleEast" checked>
      <span>Oriente Médio</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-regiao" value="SouthAsia" checked>
      <span>Sul/Sudeste Asiático</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-regiao" value="EastAsia" checked>
      <span>Leste Asiático</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-regiao" value="Oceania" checked>
      <span>Oceania</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-regiao" value="Multiple" checked>
      <span>Múltiplas Regiões</span>
      </label>
      </div>
  </section>

  <!-- 4. TIPO HISTÓRICO (NATUREZA) -->
  <section class="filtro-secao" id="secao-tipos">
      <h3 class="filtro-titulo" onclick="toggleSection('tipos')">
      Tipo Histórico <span class="toggle-icon">▼</span>
      </h3>
      <div class="filtro-conteudo" id="conteudo-tipos">
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-tipo" value="war" checked>
      <span class="tipo-badge" style="background: #e74c3c">️</span>
      <span>Guerra/Conflito</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-tipo" value="political" checked>
      <span class="tipo-badge" style="background: #3498db">️</span>
      <span>Político</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-tipo" value="economic" checked>
      <span class="tipo-badge" style="background: #e67e22"></span>
      <span>Econômico</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-tipo" value="cultural" checked>
      <span class="tipo-badge" style="background: #9b59b6"></span>
      <span>Cultural</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-tipo" value="religious" checked>
      <span class="tipo-badge" style="background: #1abc9c">️</span>
      <span>Religioso</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-tipo" value="technological" checked>
      <span class="tipo-badge" style="background: #27ae60">️</span>
      <span>Tecnológico</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-tipo" value="social" checked>
      <span class="tipo-badge" style="background: #f39c12"></span>
      <span>Social</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-tipo" value="intellectual" checked>
      <span class="tipo-badge" style="background: #8e44ad"></span>
      <span>Intelectual</span>
      </label>
      <label class="checkbox-label">
      <input type="checkbox" class="filtro-tipo" value="person" checked>
      <span class="tipo-badge" style="background: #d4af37"></span>
      <span>Pessoa</span>
      </label>
      </div>
  </section>

  <!-- BOTÃO APLICAR FILTROS -->
  <button id="aplicar-filtros-semanticos" class="btn-aplicar-filtros">
      Aplicar Contexto
  </button>
  
  <!-- BOTÃO LIMPAR -->
  <button id="limpar-filtros-semanticos" class="btn-limpar-filtros">
      Resetar Filtros
  </button>

</div>

<!-- LEGENDA FIXA (CANTO INFERIOR DIREITO) -->
<div id="legenda-tipos" class="legenda-tipos">
  <h4>Legenda de Tipos</h4>
  <div class="legenda-item"><span class="legenda-cor" style="background: #e74c3c"></span> Guerra</div>
  <div class="legenda-item"><span class="legenda-cor" style="background: #3498db"></span> Político</div>
  <div class="legenda-item"><span class="legenda-cor" style="background: #e67e22"></span> Econômico</div>
  <div class="legenda-item"><span class="legenda-cor" style="background: #9b59b6"></span> Cultural</div>
  <div class="legenda-item"><span class="legenda-cor" style="background: #1abc9c"></span> Religioso</div>
  <div class="legenda-item"><span class="legenda-cor" style="background: #27ae60"></span> Tecnológico</div>
  <div class="legenda-item"><span class="legenda-cor" style="background: #f39c12"></span> Social</div>
  <div class="legenda-item"><span class="legenda-cor" style="background: #8e44ad"></span> Intelectual</div>
  <div class="legenda-item"><span class="legenda-cor" style="background: #d4af37"></span> Pessoa</div>
</div>

<style>
.filtros-sidebar {
  max-height: 600px;
  overflow-y: auto;
}

.filtro-secao {
  margin-bottom: 20px;
  border: 1px solid #34495e;
  border-radius: 8px;
  overflow: hidden;
}

.filtro-titulo {
  background: #34495e;
  color: white;
  padding: 12px 15px;
  margin: 0;
  cursor: pointer;
  user-select: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 600;
}

.filtro-titulo:hover {
  background: #415a77;
}

.toggle-icon {
  transition: transform 0.3s;
}

.filtro-secao.collapsed .toggle-icon {
  transform: rotate(-90deg);
}

.filtro-secao.collapsed .filtro-conteudo {
  display: none;
}

.filtro-conteudo {
  padding: 15px;
  background: #1e2832;
}

.seculo-grupo {
  margin-bottom: 15px;
}

.seculo-grupo h4 {
  color: #95a5a6;
  font-size: 12px;
  margin: 0 0 8px 0;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tipo-badge {
  display: inline-block;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  text-align: center;
  line-height: 24px;
  margin-right: 5px;
}

.btn-aplicar-filtros,
.btn-limpar-filtros {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-aplicar-filtros {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}

.btn-aplicar-filtros:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
}

.btn-limpar-filtros {
  background: #2c3e50;
  color: #ecf0f1;
}

.btn-limpar-filtros:hover {
  background: #34495e;
}

/* LEGENDA FIXA */
.legenda-tipos {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(30, 40, 50, 0.95);
  border: 2px solid #34495e;
  border-radius: 10px;
  padding: 15px;
  min-width: 180px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  z-index: 999;
}

.legenda-tipos h4 {
  margin: 0 0 10px 0;
  color: white;
  font-size: 14px;
  font-weight: 600;
  text-align: center;
}

.legenda-item {
  display: flex;
  align-items: center;
  margin: 6px 0;
  color: #ecf0f1;
  font-size: 12px;
}

.legenda-cor {
  display: inline-block;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  margin-right: 8px;
  border: 1px solid rgba(255, 255, 255, 0.3);
}
</style>

<script>
function toggleSection(sectionId) {
  const section = document.getElementById(`secao-${sectionId}`);
  section.classList.toggle('collapsed');
}

// Inicializar todas as seções abertas
document.addEventListener('DOMContentLoaded', () => {
  // Todas as seções começam abertas (sem classe collapsed)
});
</script>

</body>
</html>
